<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Barangay System</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">

        <div class="banner-side">
            <img src="../images/logo1.png" alt="Barangay Logo" class="banner-background-img">
            
            <div class="banner-content">
                <h1>Barangay San Jose</h1>
                <p class="subtitle">Senior Citizen Assistance System</p>
                <p class="portal-type">User Portal</p>
            </div>
        </div>

        <div class="form-side">
            <h2>Welcome Back</h2>
            <p class="form-instruction">Enter your credentials to access the dashboard.</p>

            <form id="loginForm" method="POST">
                <div class="form-error" id="loginError" hidden></div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" placeholder="user@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-utilities">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-right-to-bracket"></i> Log In
                </button>
            </form>

            <p class="switch-portal">Not registered yet? <a href="register.html">Register here</a></p>
            
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0; text-align: center;">
                <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 12px;">Are you an administrator?</p>
                <a href="file:///C:/Users/Admin/Documents/2nd%20Yr%20-%202nd%20Sem/WEB%20DEVELOPMENT/UpdatedFinalWebDev/admin/auth/index.html" style="display: inline-block; padding: 12px 24px; background-color: #032c63; color: white; text-decoration: none; border-radius: 10px; font-weight: 600; transition: background-color 0.2s;">
                    <i class="fa-solid fa-shield"></i> Admin Login
                </a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginButton = loginForm.querySelector('button[type="submit"]');

        const showLoginError = (message) => {
            loginError.textContent = message;
            loginError.hidden = false;
            loginError.style.display = 'flex';
            emailInput.classList.add('input-error');
            passwordInput.classList.add('input-error');
        };

        const clearLoginError = () => {
            loginError.textContent = '';
            loginError.hidden = true;
            loginError.style.display = 'none';
            emailInput.classList.remove('input-error');
            passwordInput.classList.remove('input-error');
        };

        // Clear error styling when user types in either field
        emailInput.addEventListener('input', clearLoginError);
        passwordInput.addEventListener('input', clearLoginError);

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                return;
            }

            const originalText = loginButton.innerHTML;
            loginButton.disabled = true;
            loginButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, portal: 'user' }),
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Unable to sign in.');
                }

                clearLoginError();

                const authPayload = {
                    idToken: data.idToken,
                    refreshToken: data.refreshToken,
                    user: data.user,
                };

                localStorage.setItem('senetizenAuth', JSON.stringify(authPayload));
                localStorage.setItem('senetizenUser', JSON.stringify(data.user));
                sessionStorage.setItem('senetizenLoggedIn', 'true');
                localStorage.setItem('senetizenRemembered', loginForm.remember.checked ? 'true' : 'false');

                window.location.href = 'index.html';
            } catch (error) {
                showLoginError(error.message || 'Login failed.');
            } finally {
                loginButton.disabled = false;
                loginButton.innerHTML = originalText;
            }
        });

        // Ensure error is hidden on page load
        clearLoginError();
    </script>
</body>
</html>
